                    { n: 97, q: "Prognosis of cryptococcosis: With early diagnosis and treatment, most people with cryptococcosis will have a:", o: ["Bad prognosis because the infection will be spreaded.", "Good prognosis because the infection will be stopped.", "Mortality rate as high as 30%.", "A+B", "B+C"], a: "E" },
                    { n: 98, q: "Prevention of cryptococcosis:", o: ["Vaccination", "Large accumulations of bird droppings should be conserved.", "Not use antibiotics to prevent repeat infections.", "Large accumulations of bird droppings should be removed after first being wetted.", "A+B+C+D"], a: "D" }
                ]
            },
            {
                id: "onycho",
                title: "Onychomycosis (Q99-107)",
                questions: [
                    { n: 99, q: "Onychomycosis is fungal infection of the:", o: ["Hand", "Nail plate, nail bed", "Lung", "Liver", "Others"], a: "B" },
                    { n: 100, q: "The responsible agents for nail infection is/are:", o: ["Fungi,", "Yeasts, and molds", "Molds", "A+B", "A+B+C"], a: "E" },
                    { n: 101, q: "Onychomycosis is caused by:", o: ["1 main classes of fungi", "2 main classes of fungi", "4 main classes of fungi", "5 main classes of fungi", "Others"], a: "E" },
                    { n: 102, q: "The most common cause of onychomycosis is/are:", o: ["Dermatophytes", "Candida albican", "Toxoplasma gondii", "Epidermophyton genera", "Others"], a: "A" },
                    { n: 103, q: "Risk factors for onychomycosis (toenail fungus) is/are:", o: ["Prior trauma", "Participation in fitness activities", "Warm climate", "B+C", "A+B+C"], a: "E" },
                    { n: 104, q: "Diagnosis of onychomycosis based on:", o: ["Physical examination", "Patients’ history", "Microscopy and culture of nail specimens", "Biopsy", "A+B+C"], a: "E" },
                    { n: 105, q: "Differential diagnosis of onychomycosis include:", o: ["Psoriasis.", "Normal aging.", "Yellow nail syndrome", "Chronic paronychia.", "A+B+C+D"], a: "E" },
                    { n: 106, q: "Complications of onychomycosis is/are:", o: ["Lead to other serious infections eg. cellulites", "A severe case of nail fungus can be painful and may cause permanent damage to your nails.", "Distorted in shape", "A+B", "A+B+C"], a: "E" },
                    { n: 107, q: "Prevention of onychomycosis based on:", o: ["Keep your feet wet.", "Use public swimming pools", "Share personal belongings such as socks, slippers, or shoes especially with people known to have onychomycosis", "keep your nails clean and trimmed", "Others"], a: "D" }
                ]
            }
        ];

        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let globalQIndex = 0;

            quizData.forEach(section => {
                const sectionHtml = `
                    <div id="sec-${section.id}" class="space-y-8">
                        <div class="flex justify-between items-center border-b-4 border-slate-200 pb-3">
                            <h2 class="text-2xl font-black text-slate-800 uppercase">${section.title}</h2>
                            <button onclick="resetSection('${section.id}')" class="redo-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                Redo Section
                            </button>
                        </div>
                        <div class="grid grid-cols-1 gap-6">
                            ${section.questions.map((q, qIdx) => {
                                globalQIndex++;
                                return `
                                    <div class="bg-white p-6 border-l-8 border-slate-400 rounded-2xl shadow-md hover:shadow-lg transition-shadow q-block" data-section="${section.id}" data-correct="${q.a}">
                                        <p class="font-bold text-lg mb-4 text-gray-800">Question ${q.n}: ${q.q}</p>
                                        <div class="grid grid-cols-1 gap-3 options-grid">
                                            ${q.o.map((opt, oIdx) => {
                                                const letter = String.fromCharCode(65 + oIdx);
                                                return `
                                                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-all relative">
                                                        <input type="radio" name="sec${section.id}-q${qIdx}" value="${letter}" class="hidden" onchange="checkAnswer(this)">
                                                        <span class="font-bold text-slate-600 mr-3">${letter})-</span>
                                                        <span class="text-gray-700">${opt}</span>
                                                    </label>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', sectionHtml);
            });
            document.getElementById('max-score').textContent = globalQIndex;
        }

        function checkAnswer(input) {
            const block = input.closest('.q-block');
            const grid = input.closest('.options-grid');
            const labels = grid.querySelectorAll('label');
            const selectedVal = input.value;
            const correctVal = block.dataset.correct;

            grid.classList.add('disabled-labels');

            labels.forEach(label => {
                const radio = label.querySelector('input');
                if (radio.value === correctVal) {
                    label.classList.add('option-correct');
                }
                if (radio.value === selectedVal && selectedVal !== correctVal) {
                    label.classList.add('option-incorrect');
                }
            });

            if (selectedVal === correctVal) {
                playCorrect();
            } else {
                playWrong();
            }
        }

        function resetSection(sectionId) {
            const blocks = document.querySelectorAll(`.q-block[data-section="${sectionId}"]`);
            blocks.forEach(block => {
                const grid = block.querySelector('.options-grid');
                grid.classList.remove('disabled-labels');
                const labels = grid.querySelectorAll('label');
                labels.forEach(l => {
                    l.classList.remove('option-correct', 'option-incorrect');
                    l.querySelector('input').checked = false;
                });
            });
        }

        function calculateScore() {
            let score = 0;
            const blocks = document.querySelectorAll('.q-block');
            blocks.forEach(block => {
                const checked = block.querySelector('input:checked');
                if (checked && checked.value === block.dataset.correct) {
                    score++;
                }
            });
            document.getElementById('total-score').textContent = score;
            document.getElementById('final-result').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
